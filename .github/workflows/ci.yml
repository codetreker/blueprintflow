name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate JSON metadata
        run: |
          jq . .agents/plugins/marketplace.json >/dev/null
          jq . .claude-plugin/marketplace.json >/dev/null
          jq . plugins/blueprintflow/.codex-plugin/plugin.json >/dev/null
          jq . plugins/blueprintflow/.claude-plugin/plugin.json >/dev/null

      - name: Validate plugin layout
        run: .github/scripts/validate-plugin-layout.sh

      - name: Validate skill metadata
        run: .github/scripts/validate-skills.sh

      - name: Validate release version bump
        if: github.event_name == 'pull_request'
        run: .github/scripts/validate-release-version.sh "origin/${{ github.base_ref }}"

      - name: Check whitespace
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
