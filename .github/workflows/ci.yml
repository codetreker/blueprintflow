name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bash .github/scripts/with-isolated-bf-env.sh npm ci

      - name: Install ripgrep
        # The test suite's forbidden-token / Han-char guards use rg and now fail
        # closed if it is absent (require_cmd rg), so install it explicitly.
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Run full tests
        run: bash .github/scripts/with-isolated-bf-env.sh npm test

      - name: Validate JSON metadata
        run: |
          jq . .agents/plugins/marketplace.json >/dev/null
          jq . .claude-plugin/marketplace.json >/dev/null
          jq . plugins/blueprintflow/.codex-plugin/plugin.json >/dev/null
          jq . plugins/blueprintflow/.claude-plugin/plugin.json >/dev/null

      - name: Validate plugin layout
        run: .github/scripts/validate-plugin-layout.sh

      - name: Validate BF package layout
        run: .github/scripts/validate-bf-package-layout.sh

      - name: Validate skill metadata
        run: .github/scripts/validate-skills.sh

      - name: Validate release version bump
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="origin/${BASE_REF}"
          else
            base="$PUSH_BEFORE"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              echo "✓ Push base is all-zeros/empty (branch creation / first push) — bootstrap, skipping release version gate."
              exit 0
            fi
          fi
          .github/scripts/validate-release-version.sh "$base"

      - name: Validate @codetreker/bf version bump
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="origin/${BASE_REF}"
          else
            base="$PUSH_BEFORE"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              echo "✓ Push base is all-zeros/empty (branch creation / first push) — bootstrap, skipping @codetreker/bf version gate."
              exit 0
            fi
          fi
          .github/scripts/validate-bf-version.sh "$base"

      - name: Check whitespace
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          else
            git diff-tree --check --no-commit-id --root -r HEAD
          fi
