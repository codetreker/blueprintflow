id: bugfix
desc: Bugfix task with focused regression red-green, validation, docs sync, review, and closure gates
instruction: |
  Use this pipeline for defect fixes.
  It requires a focused failing regression test or reproduction before implementation, expected failure confirmation, the smallest fix, a focused passing test, validation, design-doc-sync when the fix changes accepted behavior contracts, independent review, and a terminal-state closure stage.
  Run the stages in order.
  Read the task spec, bf.md Goal/Boundary, relevant discussion, confirmed project design docs, and host-runtime strategy before the first stage.
  Each stage must produce its named artifact or review result before the next stage starts.
  When design-doc sync or full validation is not required, record explicit not-applicable evidence.
  For claimed task work, the coordinator assigns regression reproduction, implementation, focused passing-test, validation, design-doc sync, and verification fixes to a host-compatible task driver; in Codex, that actor is a Codex subagent.
  If task-driver capacity or tooling is unavailable, stop unless the user explicitly overrides the delegation rule.
  Review stages must remain independent from the actor whose work they review.
  When starting a role-bound actor, pass the role id and role instruction path, then require the actor to read its own role instruction before the stage instruction.
  Do not inline role instruction content; stop when the actor cannot read the role file.
  Stop on Blocker or High review findings and send fixes to the same task driver or a new task driver before rerunning the affected stage.
  Stop before task verification if any external artifact or side effect lacks a terminal state, handoff owner, or explicit stop condition.
  Do not edit locked bf.md or task spec.md content after accept; only the harness may flip AC checkboxes, advance State, sync Updated, and write task execution metadata.
  The task driver produces closure evidence before task-level BF acceptance review and readiness verification; the coordinator reruns final verify before merge, complete, and cleanup.
stages:
  - id: regression-reproduction
    capability: software-implementation
    output: artifacts/regression-reproduction.md
    instruction: |
      Reproduce the defect or write a focused failing regression test before implementation.
      Record the exact command, input, observed failure, and why it matches the locked task scope.
      Do not implement the fix in this stage.

  - id: expected-failure-review
    capability: quality-assurance
    reviews: artifacts/regression-reproduction.md
    output: artifacts/expected-failure-review.md
    instruction: |
      Confirm the focused failing regression test or reproduction fails for the expected failure.
      Reject failures caused by setup mistakes, unrelated breakage, or assertions that do not prove the reported defect.
      Record findings and signoff in artifacts/expected-failure-review.md.

  - id: implementation
    capability: software-implementation
    instruction: |
      Implement the smallest fix that addresses the confirmed defect.
      Keep scope limited to the locked task contract and the confirmed failing case.

  - id: focused-passing-test
    capability: software-implementation
    output: artifacts/focused-passing-test.md
    instruction: |
      Run the focused passing test or reproduction command after the fix.
      Record the command output and show that the confirmed failure now passes.

  - id: design-doc-sync
    capability: system-architecture
    output: artifacts/design-doc-sync.md
    instruction: |
      If the bug reveals design drift, do not choose whether code or docs win in this stage.
      Record the drift and stop for user clarification as described in project-docs.md.
      Update confirmed project design docs only when the clarified path or locked task scope changes accepted behavior contracts.
      If no design-doc sync is required, write not-applicable evidence that explains why the fix did not change accepted design.

  - id: validation
    capability: software-implementation
    output: artifacts/validation.md
    instruction: |
      Run relevant validation for the fix and record the command output.
      For runtime or release-facing changes, run full validation unless the locked task contract defines a narrower validation boundary.
      If full validation is not required, write not-applicable evidence explaining the boundary.

  - id: code-review
    capability: quality-assurance
    output: artifacts/code-review.md
    instruction: |
      Review the fix, regression evidence, focused passing test, design-doc-sync evidence, validation evidence, and task AC from outside the implementation.
      Confirm each AC has matching evidence and no Blocker or High findings.
      Record findings and signoff in artifacts/code-review.md.
      Sign off only the AC ids that the review independently verifies.

  - id: terminal-state-closure
    capability: quality-assurance
    output: artifacts/terminal-state-closure.md
    instruction: |
      Produce task-local terminal-state closure evidence after code review.
      Inspect the task spec, Evidence artifacts, review results, and implementation output.
      List every external artifact or side effect created by the fix, such as a PR, release, deploy, ticket, published package, or handoff document.
      Confirm each item has reached its terminal state, has an explicit handoff owner, or is blocked by an explicit stop condition.
      Record any whole-work-object side effect that must be checked again at Final Acceptance in artifacts/terminal-state-closure.md.
      Do not clean BF-owned task worktrees or task branches in this stage; the coordinator runs bf-harness cleanup after bf-harness complete succeeds.
      Use this evidence before task-level BF acceptance review and readiness verification; the coordinator reruns final verify before merge, complete, and cleanup.
