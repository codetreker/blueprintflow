id: feature
desc: Feature task with design-first architecture, implementation, validation, docs sync, and review gates
instruction: |
  Use this design-first pipeline for feature tasks whose execution needs design before code.
  It requires architecture/design, an evidence plan, task-appropriate validation, E2E protocol discovery for runtime-facing work, design-doc-sync when accepted design changes, independent review, security-review, and terminal-state closure.
  It does not require red-first TDD for every feature task; use the bugfix pipeline when the task is a defect fix that needs strict regression red-green work.
  Run the stages in order.
  Read the task spec, bf.md Goal/Boundary, any relevant discussion, and confirmed project design docs before the first stage, along with the host-runtime strategy.
  Each stage must produce its named artifact or review result before the next stage starts.
  When design-doc sync, full validation, or security review is not required, record explicit not-applicable evidence.
  For claimed task work, the coordinator assigns non-review task work and verification fixes to a host-compatible task driver; in Codex, that actor is a Codex subagent.
  If task-driver capacity or tooling is unavailable, stop unless the user explicitly overrides the delegation rule.
  Prefer separate leaf workers for stage work when isolation improves review quality or context focus and the host-runtime strategy allows nested delegation; review stages must remain independent from the actor whose work they review.
  When starting a role-bound actor, pass the role id and role instruction path, then require the actor to read its own role instruction before the stage instruction.
  Do not inline role instruction content; stop when the actor cannot read the role file.
  Stop on any Blocker or High review finding; send fixes to the same task driver or a new task driver and rerun the affected review stage before continuing.
  Do not edit locked bf.md or task spec.md content after accept; only the harness may flip AC checkboxes, advance State, sync Updated, and write task execution metadata.
stages:
  - id: architecture-design
    capability: system-architecture
    output: artifacts/architecture.md
    instruction: |
      Produce the architecture proposal for this task before implementation design.
      Define the affected boundaries, public contracts, data/control flow, key tradeoffs, risks, and what stays out of scope.
      Keep the artifact specific enough for a reviewer to reject or approve before implementation design starts.

  - id: architecture-review
    capability: design-review
    reviews: artifacts/architecture.md
    output: artifacts/architecture-review.md
    instruction: |
      Review the architecture artifact against the task spec, bf.md Goal/Boundary, existing system shape, and likely downstream implementation cost.
      Record findings and signoff in artifacts/architecture-review.md.
      Use Blocker or High findings for unclear boundaries, unsafe coupling, missing contracts, or scope drift.
      The pipeline stops until those findings are fixed.

  - id: implementation-design
    capability: system-architecture
    output: artifacts/design.md
    instruction: |
      Produce the implementation design after architecture review passes.
      Name the files/modules to change, interfaces to add or modify, migration or backward compatibility concerns, test strategy, and evidence plan.
      The design should be concrete enough for implementation to proceed without inventing scope.

  - id: design-review
    capability: design-review
    reviews: artifacts/design.md
    output: artifacts/design-review.md
    instruction: |
      Review the implementation design before code changes.
      Check that it follows the approved architecture, fits the task Boundary, has an executable test and evidence plan, and does not hide extra work.
      Record findings and signoff in artifacts/design-review.md.
      Blocker or High findings stop implementation until the design is revised and reviewed again.

  - id: implementation
    capability: software-implementation
    instruction: |
      Implement only the locked task scope.
      Follow the approved architecture and implementation design and produce every required Evidence artifact from the task spec.
      Record command output, changed files, screenshots, or reviewer notes as requested by the Evidence section.

  - id: design-doc-sync
    capability: system-architecture
    output: artifacts/design-doc-sync.md
    instruction: |
      Update confirmed project design docs when the task changes accepted system boundaries, module ownership, state authority, cross-module flows, validation boundaries, or known gaps.
      If no design-doc sync is required, write not-applicable evidence that names why the task did not change accepted design.

  - id: validation
    capability: software-implementation
    output: artifacts/validation.md
    instruction: |
      Run task-appropriate validation and record the command output.
      For runtime or release-facing changes, run full validation unless the locked task contract defines a narrower validation boundary.
      If full validation is not required, write not-applicable evidence explaining the boundary.

  - id: e2e-protocol-discovery
    capability: software-implementation
    output: artifacts/e2e-protocol-discovery.md
    instruction: |
      Discover and use the target repository's E2E protocol after generic validation and before review.
      Inspect project instructions, docs, package scripts, E2E test configs, Makefiles, docker compose files, CI workflows, and comparable local orchestration signals.
      When a protocol exists, use the repository-owned path to start required local services, wait for readiness, run project-appropriate E2E verification, and cleanup processes, ports, temporary data, and other local resources.
      For frontend runtime work, record Playwright output or output from the equivalent project E2E tool as the expected evidence shape.
      When runtime-facing work lacks a repository-owned E2E protocol, stop before code-review instead of guessing commands. Write the missing-protocol finding, inspected sources, and exact coordinator action needed: route or create a separate accepted setup task using the built-in e2e-verification-setup pipeline, or return to DDD if the current task contract must change.
      Do not treat missing runtime-facing E2E as skipped evidence.
      When E2E is not applicable to the task or cannot run in the current environment, record explicit not-applicable or skipped evidence with the reason and substitute validation.

  - id: code-review
    capability: quality-assurance
    output: artifacts/code-review.md
    instruction: |
      Run a multi-perspective review of the code, Evidence artifacts, design-doc-sync evidence, validation evidence, and task AC from outside the implementation.
      Gather implementation perspective checks, architecture perspective checks, and QA perspective checks while keeping quality-assurance as the stage owner.
      Confirm each AC has matching evidence and no Blocker or High findings.
      Record findings, perspective checks, and signoff in artifacts/code-review.md.
      Sign off only the AC ids that the review independently verifies.

  - id: security-review
    capability: security-review
    output: artifacts/security-review.md
    instruction: |
      Review the feature change after code review and before terminal-state closure for security baseline risk.
      Check authentication, authorization, privilege boundaries, secrets, dependency/package exposure, command or shell execution, input handling, data handling, logging, and release integrity as applicable to the locked task scope.
      Stop on any Blocker or High finding; send fixes to the task driver before continuing.
      If the task has no security-relevant change, record not-applicable evidence with rationale and cite the reviewed files, commands, and Evidence artifacts.
      Record findings and signoff in artifacts/security-review.md.

  - id: terminal-state-closure
    capability: quality-assurance
    output: artifacts/terminal-state-closure.md
    instruction: |
      Produce task-local terminal-state closure evidence after code review and security review.
      Inspect the task spec, Evidence artifacts, review results, and implementation output.
      List every external artifact or side effect created by the task, such as a PR, deploy, release, ticket, published package, or handoff document.
      Confirm each item has reached its terminal state, has an explicit handoff owner, or is blocked by an explicit stop condition, so no dangling user-perspective work is treated as done.
      Record any whole-work-object side effect that must be checked again at Final Acceptance in artifacts/terminal-state-closure.md.
      Do not clean BF-owned task worktrees or task branches in this stage; the coordinator runs bf-harness cleanup after bf-harness complete succeeds.
      Use this evidence before task-level BF acceptance review and readiness verification; the coordinator reruns final verify before merge, complete, and cleanup.
