id: feature
desc: Feature task with design-first architecture, implementation, validation, docs sync, and review gates
instruction: |
  Use this design-first pipeline for feature tasks whose execution needs design
  before code. It requires architecture/design, an evidence plan,
  task-appropriate validation, design-doc-sync when accepted design changes, and
  independent review. It does not require red-first TDD for every feature task;
  use the bugfix pipeline when the task is a defect fix that needs strict
  regression red-green work. Run the stages in order. Read the task spec, bf.md
  Goal/Boundary, any relevant discussion, and confirmed project design docs
  before the first stage, along with the host-runtime strategy. Each stage must
  produce its named artifact or review result before the next stage starts. When
  design-doc sync or full validation is
  not required, record explicit not-applicable evidence. Prefer separate
  leaf workers for stage work when isolation improves review quality or context
  focus and the host-runtime strategy allows nested delegation; review stages
  must remain independent from the implementation work they review. When
  starting a role-bound actor, pass the role id and role
  instruction path, then require the actor to read that role instruction
  before the stage instruction. Inline role instruction content only when local
  file access is unavailable. Stop on any Blocker or High review finding; fix
  the finding and rerun the affected review stage before continuing. Do not edit
  locked bf.md or task spec.md content after accept; only the harness may flip
  AC checkboxes, advance State, sync Updated, and write task execution metadata.
stages:
  - id: architecture-design
    capability: system-architecture
    output: artifacts/architecture.md
    instruction: |
      Produce the architecture proposal for this task before implementation
      design. Define the affected boundaries, public contracts, data/control
      flow, key tradeoffs, risks, and what stays out of scope. Keep the artifact
      specific enough for a reviewer to reject or approve before implementation
      design starts.

  - id: architecture-review
    capability: design-review
    reviews: artifacts/architecture.md
    instruction: |
      Review the architecture artifact against the task spec, bf.md Goal/Boundary,
      existing system shape, and likely downstream implementation cost. Record
      Blocker or High findings for unclear boundaries, unsafe coupling, missing
      contracts, or scope drift. The pipeline stops until those findings are fixed.

  - id: implementation-design
    capability: system-architecture
    output: artifacts/design.md
    instruction: |
      Produce the implementation design after architecture review passes. Name the
      files/modules to change, interfaces to add or modify, migration or backward
      compatibility concerns, test strategy, and evidence plan. The design should
      be concrete enough for implementation to proceed without inventing scope.

  - id: design-review
    capability: design-review
    reviews: artifacts/design.md
    instruction: |
      Review the implementation design before code changes. Check that it follows
      the approved architecture, fits the task Boundary, has an executable test
      and evidence plan, and does not hide extra work. Blocker or High findings
      stop implementation until the design is revised and reviewed again.

  - id: implementation
    capability: software-implementation
    instruction: |
      Implement only the locked task scope. Follow the approved architecture and
      implementation design and produce every required Evidence artifact from
      the task spec. Record command output, changed files, screenshots, or
      reviewer notes as requested by the Evidence section.

  - id: design-doc-sync
    capability: system-architecture
    output: artifacts/design-doc-sync.md
    instruction: |
      Update confirmed project design docs when the task changes accepted system
      boundaries, module ownership, state authority, cross-module flows,
      validation boundaries, or known gaps. If no design-doc sync is required,
      write not-applicable evidence that names why the task did not change
      accepted design.

  - id: validation
    capability: software-implementation
    output: artifacts/validation.md
    instruction: |
      Run task-appropriate validation and record the command output. For runtime
      or release-facing changes, run full validation unless the locked task
      contract defines a narrower validation boundary. If full validation is not
      required, write not-applicable evidence explaining the boundary.

  - id: code-review
    capability: quality-assurance
    instruction: |
      Run a multi-perspective review of the code, Evidence artifacts,
      design-doc-sync evidence, validation evidence, and task AC from outside
      the implementation. Gather implementation perspective checks, architecture
      perspective checks, and QA perspective checks while keeping
      quality-assurance as the stage owner. Confirm each AC has matching
      evidence and no Blocker or High findings. Sign off only the AC ids that
      the review independently verifies.

  - id: terminal-state-closure
    capability: quality-assurance
    instruction: |
      Produce task-local terminal-state closure evidence after code review. Inspect
      the task spec, Evidence artifacts, review results, and implementation
      output. List every external artifact or side effect created by the task,
      such as a PR, deploy, release, ticket, published package, or handoff
      document. Confirm each item has reached its terminal state, has an explicit
      handoff owner, or is blocked by an explicit stop condition, so no
      dangling user-perspective work is treated as done. Record any
      whole-work-object side effect that must be checked again at Final
      Acceptance. The coordinator decides whether this evidence is sufficient
      before opening task-level BF acceptance review.
